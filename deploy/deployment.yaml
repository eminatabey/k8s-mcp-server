apiVersion: v1
kind: Namespace
metadata:
  name: mcp
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: k8s-mcp-server
  namespace: mcp
  labels:
    app: k8s-mcp-server
spec:
  replicas: 1
  selector:
    matchLabels:
      app: k8s-mcp-server
  template:
    metadata:
      labels:
        app: k8s-mcp-server
    spec:
      serviceAccountName: k8s-mcp-server
      automountServiceAccountToken: true
      containers:
        - name: server
          image: ghcr.io/eminatabey/k8s-mcp-server:latest
          imagePullPolicy: IfNotPresent
          args: ["--addr=:8080"]
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: MCP_ADDR
              value: ":8080"
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 256Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 65532
            capabilities:
              drop: ["ALL"]
          readinessProbe:
            tcpSocket:
              port: 8080
            initialDelaySeconds: 2
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: k8s-mcp-server
  namespace: mcp
spec:
  selector:
    app: k8s-mcp-server
  ports:
    - name: http
      port: 80
      targetPort: 8080
  type: ClusterIP
